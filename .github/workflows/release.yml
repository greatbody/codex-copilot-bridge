name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Build release archive
        run: bun run package:release

      - name: Compute archive metadata
        id: archive
        run: |
          VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          ASSET="codex-copilot-bridge-v${VERSION}-darwin-x64.tar.gz"
          SHA256="$(shasum -a 256 "dist/${ASSET}" | cut -d ' ' -f 1)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.archive.outputs.version }}" "dist/${{ steps.archive.outputs.asset }}" \
            --title "v${{ steps.archive.outputs.version }}" \
            --notes "macOS x64 release. Tested on macOS with Codex CLI v0.137.0." \
            --verify-tag

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: greatbody/homebrew-tap
          token: ${{ secrets.GH_TOKEN_FOR_TAP }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          bun run scripts/update-homebrew-formula.ts \
            homebrew-tap/Formula/codex-copilot-bridge.rb \
            "${{ steps.archive.outputs.version }}" \
            "${{ steps.archive.outputs.sha256 }}"

      - name: Commit Homebrew formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/codex-copilot-bridge.rb
          git commit -m "codex-copilot-bridge ${{ steps.archive.outputs.version }}"
          git push
